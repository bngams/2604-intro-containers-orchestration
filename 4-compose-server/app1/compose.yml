services:
  app1:
    # Use build OR ...
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    
    # OR use image and command directly 
    image: node:22-alpine
    command: sh -c "npm install && npm run start"
    volumes:
     - ./:/app
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"] # check if app is responding on port 3000
      interval: 10s
      retries: 5
      timeout: 3s
      start_period: 10s
    depends_on:
      db1:
        condition: service_healthy
        restart: true
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 250M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - 127.0.0.1:3000:3000
    env_file:
      - .env
    networks:
      - app1_net
      - public_net
  db1:
    image: mysql:8.0
    hostname: mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5 
      timeout: 3s
      start_period: 10s
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 250M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    networks:
      - app1_net

networks:
  app1_net:
    driver: bridge